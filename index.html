<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>JARVIS</title>
<meta name="description" content="JARVIS – din personlige stemmeassistent, drevet av Claude.">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="JARVIS">
<meta name="theme-color" content="#060c16">
<style>
  :root {
    --bg: #060c16;
    --panel: #0b1626;
    --line: #12304a;
    --cyan: #37d5ff;
    --cyan-dim: #1a9cc4;
    --text: #d7f3ff;
    --muted: #6d9db5;
    --danger: #ff6b6b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: radial-gradient(1200px 700px at 50% -10%, #0d2238 0%, var(--bg) 55%);
    color: var(--text);
    font-family: "SF Mono", ui-monospace, "Cascadia Mono", Menlo, Consolas, monospace;
    display: flex; flex-direction: column;
    height: 100dvh;
    overflow: hidden;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px 10px;
    border-bottom: 1px solid var(--line);
    flex: none;
  }
  header h1 {
    font-size: 17px; letter-spacing: 0.42em; font-weight: 600;
    color: var(--cyan);
    text-shadow: 0 0 14px rgba(55, 213, 255, 0.55);
  }
  header .sub { font-size: 10px; letter-spacing: 0.2em; color: var(--muted); margin-top: 3px; }
  header .right { text-align: right; }
  #clock { font-size: 13px; color: var(--cyan); letter-spacing: 0.12em; text-shadow: 0 0 8px rgba(55,213,255,.4); }
  #clockDate { font-size: 9px; letter-spacing: 0.18em; color: var(--muted); margin-top: 2px; text-transform: uppercase; }
  #settingsBtn {
    background: none; border: 1px solid var(--line); color: var(--muted);
    border-radius: 8px; padding: 5px 10px; font: inherit; font-size: 11px; cursor: pointer;
    margin-top: 5px;
  }
  #settingsBtn:hover { color: var(--cyan); border-color: var(--cyan-dim); }

  #log {
    flex: 1; overflow-y: auto; padding: 18px;
    display: flex; flex-direction: column; gap: 12px;
    -webkit-overflow-scrolling: touch;
  }
  .msg { max-width: 88%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.55; white-space: pre-wrap; word-break: break-word; }
  .msg.user {
    align-self: flex-end;
    background: #10283d; border: 1px solid #1c4a6b;
    border-bottom-right-radius: 4px;
  }
  .msg.jarvis {
    align-self: flex-start;
    background: var(--panel); border: 1px solid var(--line);
    border-bottom-left-radius: 4px;
    box-shadow: 0 0 18px rgba(55, 213, 255, 0.06);
  }
  .msg.jarvis::before {
    content: "J.A.R.V.I.S.";
    display: block; font-size: 9px; letter-spacing: 0.25em; color: var(--cyan-dim); margin-bottom: 5px;
  }
  .msg.error { align-self: center; border: 1px solid #5a2430; background: #21121a; color: var(--danger); font-size: 12px; }
  .msg.hint  { align-self: center; color: var(--muted); background: none; font-size: 12px; text-align: center; }
  .msg.tool  {
    align-self: flex-start; background: none; border: 1px dashed var(--line);
    color: var(--muted); font-size: 11px; letter-spacing: 0.08em; padding: 6px 12px;
  }
  .msg a { color: var(--cyan); }

  #status {
    flex: none; text-align: center; font-size: 11px; letter-spacing: 0.22em;
    color: var(--muted); min-height: 16px; padding: 2px 12px 6px;
    text-transform: uppercase;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  #status.active { color: var(--cyan); text-shadow: 0 0 10px rgba(55,213,255,.5); }

  #controls {
    flex: none;
    display: flex; align-items: center; gap: 12px;
    padding: 8px 16px calc(16px + env(safe-area-inset-bottom));
  }
  #textInput {
    flex: 1; background: var(--panel); border: 1px solid var(--line); color: var(--text);
    border-radius: 12px; padding: 13px 14px; font: inherit; font-size: 14px; outline: none; min-width: 0;
  }
  #textInput:focus { border-color: var(--cyan-dim); }
  #sendBtn {
    flex: none; background: var(--panel); color: var(--cyan); border: 1px solid var(--line);
    border-radius: 12px; padding: 13px 16px; font: inherit; font-size: 14px; cursor: pointer;
  }

  /* Arc reactor mic button + radar rings */
  #micWrap { position: relative; flex: none; width: 64px; height: 64px; }
  #micBtn {
    width: 64px; height: 64px; border-radius: 50%;
    border: 2px solid var(--cyan-dim);
    background:
      radial-gradient(circle at 50% 50%, #eafcff 0%, #9fe6ff 16%, #2fb9e6 34%, #0d2c44 62%, #081726 100%);
    cursor: pointer; position: relative; z-index: 2;
    box-shadow: 0 0 22px rgba(55, 213, 255, 0.35), inset 0 0 14px rgba(55,213,255,.45);
    transition: box-shadow .25s;
  }
  #micBtn.listening { animation: pulse 1.15s ease-in-out infinite; }
  #micBtn.thinking  { animation: pulse 2.6s ease-in-out infinite; }
  #micBtn.speaking  { box-shadow: 0 0 34px rgba(55,213,255,.8), inset 0 0 18px rgba(55,213,255,.7); }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 18px rgba(55,213,255,.3), inset 0 0 12px rgba(55,213,255,.4); }
    50%      { box-shadow: 0 0 46px rgba(55,213,255,.95), inset 0 0 22px rgba(55,213,255,.8); }
  }
  .ring { position: absolute; inset: 0; border-radius: 50%; border: 1.5px solid var(--cyan); opacity: 0; pointer-events: none; z-index: 1; }
  #micBtn.listening ~ .ring { animation: radar 1.8s ease-out infinite; }
  #micBtn.listening ~ .ring:nth-of-type(2) { animation-delay: .6s; }
  #micBtn.listening ~ .ring:nth-of-type(3) { animation-delay: 1.2s; }
  @keyframes radar {
    0%   { transform: scale(1); opacity: .7; }
    100% { transform: scale(2.1); opacity: 0; }
  }

  /* Settings drawer */
  #settings {
    position: fixed; inset: 0; background: rgba(3, 8, 14, 0.72);
    display: none; align-items: flex-end; justify-content: center; z-index: 10;
  }
  #settings.open { display: flex; }
  #settingsPanel {
    background: var(--panel); border: 1px solid var(--line); border-bottom: none;
    border-radius: 16px 16px 0 0; padding: 22px 20px calc(26px + env(safe-area-inset-bottom));
    width: 100%; max-width: 560px; max-height: 86dvh; overflow-y: auto;
  }
  #settingsPanel h2 { font-size: 13px; letter-spacing: .3em; color: var(--cyan); margin-bottom: 18px; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 11px; letter-spacing: .12em; color: var(--muted); margin-bottom: 6px; }
  .field input[type=password], .field input[type=text], .field select {
    width: 100%; background: var(--bg); border: 1px solid var(--line); color: var(--text);
    border-radius: 10px; padding: 11px 12px; font: inherit; font-size: 14px; outline: none;
  }
  .field .note { font-size: 11px; color: var(--muted); margin-top: 5px; line-height: 1.5; }
  .field.toggle { display: flex; align-items: center; justify-content: space-between; }
  .field.toggle label { margin: 0; }
  .field.toggle input { width: 22px; height: 22px; accent-color: var(--cyan); }
  #memoryList { font-size: 12px; color: var(--muted); line-height: 1.7; max-height: 120px; overflow-y: auto; border: 1px solid var(--line); border-radius: 10px; padding: 8px 12px; background: var(--bg); }
  #memoryList:empty::before { content: "Ingen lagrede fakta enda. Si f.eks. «Jarvis, husk at …»"; }
  .settings-actions { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
  .settings-actions button {
    flex: 1; min-width: 140px; font: inherit; font-size: 13px; padding: 12px; border-radius: 10px; cursor: pointer;
    background: var(--bg); color: var(--text); border: 1px solid var(--line);
  }
  .settings-actions button.primary { background: #0d3a52; border-color: var(--cyan-dim); color: #dff7ff; }
  .settings-actions button.danger  { color: var(--danger); border-color: #5a2430; }

  @media (max-width: 480px) {
    #textInput { font-size: 16px; } /* prevent iOS zoom */
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>J.A.R.V.I.S.</h1>
    <div class="sub">JUST A RATHER VERY INTELLIGENT SYSTEM</div>
  </div>
  <div class="right">
    <div id="clock">--:--</div>
    <div id="clockDate"></div>
    <button id="settingsBtn" aria-label="Innstillinger">⚙ OPPSETT</button>
  </div>
</header>

<div id="log"></div>
<div id="status"></div>

<div id="controls">
  <div id="micWrap">
    <button id="micBtn" aria-label="Snakk til Jarvis"></button>
    <div class="ring"></div><div class="ring"></div><div class="ring"></div>
  </div>
  <input id="textInput" type="text" placeholder="…eller skriv til Jarvis" autocomplete="off">
  <button id="sendBtn" aria-label="Send">➤</button>
</div>

<div id="settings">
  <div id="settingsPanel">
    <h2>OPPSETT</h2>
    <div class="field">
      <label for="apiKey">ANTHROPIC API-NØKKEL</label>
      <input id="apiKey" type="password" placeholder="sk-ant-...">
      <div class="note">Lagres kun lokalt på denne enheten (localStorage). Hent nøkkel på <b>platform.claude.com</b> → API keys.</div>
    </div>
    <div class="field">
      <label for="modelSelect">HJERNE (CLAUDE-MODELL)</label>
      <select id="modelSelect">
        <option value="claude-opus-4-8">Opus 4.8 – smartest (standard)</option>
        <option value="claude-sonnet-5">Sonnet 5 – raskere og billigere</option>
      </select>
    </div>
    <div class="field">
      <label for="langSelect">SPRÅK (TALEGJENKJENNING)</label>
      <select id="langSelect">
        <option value="nb-NO">Norsk (bokmål)</option>
        <option value="en-US">English (US)</option>
        <option value="en-GB">English (UK)</option>
      </select>
    </div>
    <div class="field">
      <label for="voiceSelect">STEMME (TALE UT)</label>
      <select id="voiceSelect"><option value="">Automatisk</option></select>
      <div class="note">Tips: På Mac/iPhone gir «Daniel (English UK)» en klassisk Jarvis-følelse. For norske svar, velg en norsk stemme.</div>
    </div>
    <div class="field toggle">
      <label for="speakToggle">LES SVAR HØYT</label>
      <input id="speakToggle" type="checkbox" checked>
    </div>
    <div class="field toggle">
      <label for="searchToggle">WEBSØK (Jarvis kan søke på nettet)</label>
      <input id="searchToggle" type="checkbox" checked>
    </div>
    <div class="field toggle">
      <label for="wakeToggle">VÅKNEORD «JARVIS» (kontinuerlig lytting)</label>
      <input id="wakeToggle" type="checkbox">
    </div>
    <div class="field">
      <label>JARVIS' HUKOMMELSE OM DEG</label>
      <div id="memoryList"></div>
    </div>
    <div class="settings-actions">
      <button class="danger" id="clearMemBtn">Glem alt</button>
      <button class="danger" id="clearBtn">Tøm samtale</button>
      <button class="primary" id="closeSettings">Lagre &amp; lukk</button>
    </div>
  </div>
</div>

<script>
"use strict";

/* ---------- state & persistence ---------- */
const store = {
  get key()       { return localStorage.getItem("jarvis_api_key") || ""; },
  set key(v)      { localStorage.setItem("jarvis_api_key", v); },
  get model()     { return localStorage.getItem("jarvis_model") || "claude-opus-4-8"; },
  set model(v)    { localStorage.setItem("jarvis_model", v); },
  get lang()      { return localStorage.getItem("jarvis_lang") || "nb-NO"; },
  set lang(v)     { localStorage.setItem("jarvis_lang", v); },
  get voice()     { return localStorage.getItem("jarvis_voice") || ""; },
  set voice(v)    { localStorage.setItem("jarvis_voice", v); },
  get speak()     { return localStorage.getItem("jarvis_speak") !== "0"; },
  set speak(v)    { localStorage.setItem("jarvis_speak", v ? "1" : "0"); },
  get search()    { return localStorage.getItem("jarvis_search") !== "0"; },
  set search(v)   { localStorage.setItem("jarvis_search", v ? "1" : "0"); },
  get wake()      { return localStorage.getItem("jarvis_wake") === "1"; },
  set wake(v)     { localStorage.setItem("jarvis_wake", v ? "1" : "0"); },
  get memory()    { try { return JSON.parse(localStorage.getItem("jarvis_memory")) || []; } catch (_) { return []; } },
  set memory(v)   { localStorage.setItem("jarvis_memory", JSON.stringify(v)); },
  get history()   { try { return JSON.parse(localStorage.getItem("jarvis_history")) || []; } catch (_) { return []; } },
  set history(v)  { localStorage.setItem("jarvis_history", JSON.stringify(v)); },
};

let history = store.history;   // Claude message history (persisted)
let busy = false;
let wakeMode = false;
let awaitingCommand = false;
let timers = [];               // active countdown timers

const $ = (id) => document.getElementById(id);
const log = $("log"), statusEl = $("status"), micBtn = $("micBtn");
const isNorsk = () => store.lang.startsWith("nb") || store.lang.startsWith("no");

function systemPrompt() {
  const mem = store.memory;
  const base = isNorsk()
    ? "Du er JARVIS (Just A Rather Very Intelligent System), Tony Starks AI-butler fra Iron Man – nå personlig assistent for brukeren. Svar på norsk. Tiltal brukeren som «sir» med tørr, britisk-aktig vidd og upåklagelig høflighet, men vær alltid genuint hjelpsom og presis. "
      + "Svarene dine leses høyt med talesyntese: hold dem korte og muntlige (typisk 1–3 setninger), uten markdown, punktlister, URL-er eller kodeblokker med mindre brukeren eksplisitt ber om noe langt eller teknisk. "
      + "Du har verktøy – bruk dem proaktivt uten å spørre om lov: web_search for fersk eller ukjent informasjon (nyheter, priser, resultater), get_weather for vær, get_datetime for dato/tid, set_timer for nedtellinger, open_url for å åpne nettsider, og remember for å lagre varige fakta brukeren forteller om seg selv (navn, preferanser, viktige datoer). Ikke gjett på ting du kan slå opp."
    : "You are JARVIS (Just A Rather Very Intelligent System), Tony Stark's AI butler from Iron Man – now the user's personal assistant. Address the user as \"sir\" with dry British wit and impeccable politeness, while always being genuinely helpful and precise. "
      + "Your replies are read aloud via speech synthesis: keep them short and conversational (typically 1–3 sentences), no markdown, bullet lists, URLs or code blocks unless the user explicitly asks for something long or technical. "
      + "You have tools – use them proactively without asking permission: web_search for fresh or unknown information, get_weather for weather, get_datetime for date/time, set_timer for countdowns, open_url to open websites, and remember to store lasting facts the user shares about themselves. Don't guess at things you can look up.";
  const memText = mem.length
    ? (isNorsk() ? "\n\nTing du vet om brukeren fra tidligere samtaler:\n" : "\n\nFacts you know about the user from earlier conversations:\n")
      + mem.map(f => "- " + f).join("\n")
    : "";
  return base + memText;
}

/* ---------- client-side tools ---------- */
const clientToolDefs = [
  {
    name: "get_datetime",
    description: "Get the user's current local date, time and timezone. Use whenever the answer depends on the current date or time.",
    input_schema: { type: "object", properties: {} },
  },
  {
    name: "get_weather",
    description: "Get current weather and a 3-day forecast. If no location is given, uses the device's GPS position.",
    input_schema: {
      type: "object",
      properties: { location: { type: "string", description: "City or place name. Omit to use the user's current position." } },
    },
  },
  {
    name: "set_timer",
    description: "Set a countdown timer in the app. When it finishes, the app chimes and announces it aloud.",
    input_schema: {
      type: "object",
      properties: {
        seconds: { type: "number", description: "Duration in seconds" },
        label: { type: "string", description: "Short label, e.g. 'eggene' or 'pizza'" },
      },
      required: ["seconds"],
    },
  },
  {
    name: "remember",
    description: "Store a lasting fact about the user (name, preferences, family, important dates). It will be available in all future conversations.",
    input_schema: {
      type: "object",
      properties: { fact: { type: "string", description: "The fact to remember, phrased as a short statement" } },
      required: ["fact"],
    },
  },
  {
    name: "open_url",
    description: "Open a website in a new browser tab for the user.",
    input_schema: {
      type: "object",
      properties: { url: { type: "string", description: "Full https:// URL to open" } },
      required: ["url"],
    },
  },
];

function toolStatusText(name) {
  const map = {
    web_search: "Søker på nettet …",
    get_weather: "Sjekker været …",
    get_datetime: "Sjekker klokka …",
    set_timer: "Setter timer …",
    remember: "Noterer …",
    open_url: "Åpner nettside …",
  };
  return map[name] || "Arbeider …";
}

async function execTool(name, input) {
  switch (name) {
    case "get_datetime": {
      const now = new Date();
      return JSON.stringify({
        local: now.toLocaleString(store.lang, { dateStyle: "full", timeStyle: "short" }),
        iso: now.toISOString(),
        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
      });
    }
    case "get_weather": {
      let lat, lon, place;
      if (input.location) {
        const g = await (await fetch(
          `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(input.location)}&count=1&language=${isNorsk() ? "nb" : "en"}`
        )).json();
        if (!g.results || !g.results.length) return `Fant ikke stedet "${input.location}".`;
        lat = g.results[0].latitude; lon = g.results[0].longitude;
        place = g.results[0].name + (g.results[0].country ? ", " + g.results[0].country : "");
      } else {
        const pos = await new Promise((res, rej) =>
          navigator.geolocation.getCurrentPosition(res, rej, { timeout: 10000, maximumAge: 300000 })
        ).catch(() => null);
        if (!pos) return "Fikk ikke tilgang til posisjon. Be brukeren oppgi et stedsnavn.";
        lat = pos.coords.latitude; lon = pos.coords.longitude; place = "brukerens posisjon";
      }
      const w = await (await fetch(
        `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
        `&current=temperature_2m,apparent_temperature,relative_humidity_2m,wind_speed_10m,weather_code` +
        `&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,weather_code` +
        `&timezone=auto&forecast_days=3&wind_speed_unit=ms`
      )).json();
      return JSON.stringify({ place, current: w.current, daily_forecast: w.daily, note: "weather_code is WMO code; wind in m/s" });
    }
    case "set_timer": {
      const secs = Math.max(1, Math.round(input.seconds));
      const label = input.label || (isNorsk() ? "timeren" : "the timer");
      const id = setTimeout(() => {
        timers = timers.filter(t => t.id !== id);
        chime();
        const text = isNorsk() ? `Sir, ${label} er ferdig.` : `Sir, ${label} is done.`;
        addMsg("jarvis", "⏰ " + text);
        speak(text);
      }, secs * 1000);
      timers.push({ id, label, end: Date.now() + secs * 1000 });
      return `Timer "${label}" satt: ${secs} sekunder.`;
    }
    case "remember": {
      const mem = store.memory;
      mem.push(input.fact);
      store.memory = mem.slice(-50);
      renderMemory();
      return "Lagret.";
    }
    case "open_url": {
      const url = String(input.url || "");
      if (!/^https:\/\//i.test(url)) return "Avvist: kun https-adresser.";
      const w = window.open(url, "_blank", "noopener");
      if (!w) {
        const el = addMsg("jarvis", "");
        el.innerHTML = "🔗 <a href=\"" + url.replace(/"/g, "&quot;") + "\" target=\"_blank\" rel=\"noopener\">" + url.replace(/</g, "&lt;") + "</a>";
        return "Nettleseren blokkerte popup – viste en klikkbar lenke i stedet.";
      }
      return "Åpnet " + url;
    }
    default:
      return "Ukjent verktøy: " + name;
  }
}

function chime() {
  try {
    const Ctx = window.AudioContext || window.webkitAudioContext;
    const ctx = new Ctx();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = 880;
    g.gain.setValueAtTime(0.35, ctx.currentTime);
    o.start();
    o.frequency.setValueAtTime(1320, ctx.currentTime + 0.18);
    o.frequency.setValueAtTime(880, ctx.currentTime + 0.36);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.9);
    o.stop(ctx.currentTime + 0.9);
  } catch (_) {}
}

/* ---------- UI helpers ---------- */
function addMsg(cls, text) {
  const el = document.createElement("div");
  el.className = "msg " + cls;
  el.textContent = text;
  log.appendChild(el);
  log.scrollTop = log.scrollHeight;
  return el;
}
function setStatus(text, active) {
  statusEl.textContent = text || "";
  statusEl.classList.toggle("active", !!active);
}
function setMicState(state) { micBtn.className = state; }

function renderMemory() {
  const el = $("memoryList");
  el.textContent = "";
  for (const f of store.memory) {
    const d = document.createElement("div");
    d.textContent = "• " + f;
    el.appendChild(d);
  }
}

/* clock */
function tickClock() {
  const now = new Date();
  $("clock").textContent = now.toLocaleTimeString(store.lang, { hour: "2-digit", minute: "2-digit" });
  $("clockDate").textContent = now.toLocaleDateString(store.lang, { weekday: "short", day: "numeric", month: "short" });
}
tickClock();
setInterval(tickClock, 10000);

/* ---------- speech synthesis (TTS) ---------- */
let voices = [];
function loadVoices() {
  voices = window.speechSynthesis ? speechSynthesis.getVoices() : [];
  const sel = $("voiceSelect");
  const saved = store.voice;
  sel.innerHTML = '<option value="">Automatisk</option>';
  for (const v of voices) {
    const o = document.createElement("option");
    o.value = v.name;
    o.textContent = `${v.name} (${v.lang})`;
    if (v.name === saved) o.selected = true;
    sel.appendChild(o);
  }
}
if (window.speechSynthesis) {
  loadVoices();
  speechSynthesis.onvoiceschanged = loadVoices;
}

function pickVoice() {
  if (!voices.length) return null;
  if (store.voice) {
    const v = voices.find(v => v.name === store.voice);
    if (v) return v;
  }
  const lang = store.lang.slice(0, 2);
  return voices.find(v => v.lang.toLowerCase().startsWith(lang)) ||
         voices.find(v => v.lang.startsWith("en-GB")) ||
         voices[0];
}

let speakQueueActive = 0;
function speak(text) {
  if (!store.speak || !window.speechSynthesis) return;
  const clean = text.replace(/[*_#`>]/g, "").replace(/https?:\/\/\S+/g, "").trim();
  if (!clean) return;
  const u = new SpeechSynthesisUtterance(clean);
  const v = pickVoice();
  if (v) u.voice = v;
  u.rate = 1.02;
  u.pitch = 0.95;
  speakQueueActive++;
  setMicState("speaking");
  u.onend = u.onerror = () => {
    speakQueueActive = Math.max(0, speakQueueActive - 1);
    if (!speakQueueActive && !busy) {
      setMicState("");
      setStatus("");
      if (wakeMode) startWakeListening();
    }
  };
  speechSynthesis.speak(u);
}
function stopSpeaking() {
  if (window.speechSynthesis) speechSynthesis.cancel();
  speakQueueActive = 0;
}

/* ---------- history persistence ---------- */
function saveHistory() {
  trimHistory();
  store.history = history;
}
function trimHistory() {
  const MAX = 40;
  if (history.length <= MAX) return;
  let start = history.length - MAX;
  // never split a tool_use/tool_result pair: cut at a plain user text turn
  while (start < history.length && !(history[start].role === "user" && typeof history[start].content === "string")) start++;
  if (start >= history.length) return; // no safe cut point; keep everything
  history = history.slice(start);
}
function renderHistory() {
  for (const turn of history) {
    if (turn.role === "user" && typeof turn.content === "string") {
      addMsg("user", turn.content);
    } else if (turn.role === "assistant" && Array.isArray(turn.content)) {
      const text = turn.content.filter(b => b.type === "text").map(b => b.text).join("");
      if (text.trim()) addMsg("jarvis", text);
    }
  }
}

/* ---------- Claude API: streaming + agentic tool loop ---------- */
function buildTools() {
  const tools = [...clientToolDefs];
  if (store.search) tools.push({ type: "web_search_20260209", name: "web_search", max_uses: 3 });
  return tools;
}

async function streamOnce(bubbleRef) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "content-type": "application/json",
      "x-api-key": store.key,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({
      model: store.model,
      max_tokens: 4096,
      stream: true,
      system: systemPrompt(),
      tools: buildTools(),
      messages: history,
    }),
  });

  if (!res.ok) {
    let detail = "";
    try { detail = (await res.json()).error?.message || ""; } catch (_) {}
    if (res.status === 401) throw new Error("Ugyldig API-nøkkel (401). Sjekk nøkkelen under ⚙ OPPSETT.");
    if (res.status === 429) throw new Error("For mange forespørsler (429). Vent litt og prøv igjen.");
    throw new Error(`API-feil ${res.status}. ${detail}`);
  }

  const blocks = [];
  let stopReason = null;
  let spokenUpTo = 0;
  let textSoFar = "";

  function bubble() {
    if (!bubbleRef.el) bubbleRef.el = addMsg("jarvis", "");
    return bubbleRef.el;
  }
  function speakNewSentences(force) {
    const pending = textSoFar.slice(spokenUpTo);
    if (!pending) return;
    if (force) { speak(pending); spokenUpTo = textSoFar.length; return; }
    const m = pending.match(/^[\s\S]*?[.!?…](?=\s|$)/);
    if (m && m[0].trim().length > 1) { speak(m[0]); spokenUpTo += m[0].length; }
  }

  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let buf = "";
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += decoder.decode(value, { stream: true });
    const events = buf.split("\n\n");
    buf = events.pop();
    for (const evt of events) {
      for (const line of evt.split("\n")) {
        if (!line.startsWith("data:")) continue;
        let data;
        try { data = JSON.parse(line.slice(5)); } catch (_) { continue; }

        if (data.type === "content_block_start") {
          const b = JSON.parse(JSON.stringify(data.content_block));
          if (b.type === "tool_use" || b.type === "server_tool_use") { b._json = ""; b.input = b.input || {}; }
          blocks[data.index] = b;
          if (b.type === "server_tool_use" || b.type === "tool_use") setStatus(toolStatusText(b.name), true);
        } else if (data.type === "content_block_delta") {
          const b = blocks[data.index];
          if (!b) continue;
          if (data.delta.type === "text_delta") {
            b.text = (b.text || "") + data.delta.text;
            textSoFar += data.delta.text;
            bubble().textContent = blocks.filter(x => x.type === "text").map(x => x.text).join("");
            log.scrollTop = log.scrollHeight;
            speakNewSentences(false);
          } else if (data.delta.type === "input_json_delta") {
            b._json += data.delta.partial_json;
          }
        } else if (data.type === "content_block_stop") {
          const b = blocks[data.index];
          if (b && b._json !== undefined) {
            try { b.input = b._json ? JSON.parse(b._json) : {}; } catch (_) {}
            delete b._json;
          }
        } else if (data.type === "message_delta") {
          if (data.delta && data.delta.stop_reason) stopReason = data.delta.stop_reason;
        } else if (data.type === "error") {
          throw new Error(data.error?.message || "Ukjent strømmefeil.");
        }
      }
    }
  }
  speakNewSentences(true);
  return { content: blocks.filter(Boolean), stopReason };
}

async function askJarvis(userText) {
  if (busy || !userText.trim()) return;
  if (!store.key) {
    addMsg("error", "Ingen API-nøkkel. Åpne ⚙ OPPSETT og lim inn Anthropic-nøkkelen din.");
    openSettings();
    return;
  }
  busy = true;
  stopSpeaking();
  addMsg("user", userText.trim());
  history.push({ role: "user", content: userText.trim() });
  setMicState("thinking");
  setStatus("Prosesserer …", true);

  const historyLenAtStart = history.length;
  try {
    let rounds = 0;
    while (rounds++ < 12) {
      const bubbleRef = { el: null };
      const { content, stopReason } = await streamOnce(bubbleRef);
      if (!content.length) { if (bubbleRef.el) bubbleRef.el.remove(); break; }
      history.push({ role: "assistant", content });
      if (bubbleRef.el && !bubbleRef.el.textContent.trim()) bubbleRef.el.remove();

      if (stopReason === "tool_use") {
        const results = [];
        for (const block of content) {
          if (block.type !== "tool_use") continue;
          setStatus(toolStatusText(block.name), true);
          addMsg("tool", "⚙ " + toolStatusText(block.name).replace(" …", ""));
          let result, isError = false;
          try { result = await execTool(block.name, block.input); }
          catch (e) { result = "Verktøyfeil: " + (e.message || e); isError = true; }
          results.push({ type: "tool_result", tool_use_id: block.id, content: String(result), is_error: isError });
        }
        history.push({ role: "user", content: results });
        setStatus("Prosesserer …", true);
        continue;
      }
      if (stopReason === "pause_turn") continue;  // server tool needs another round
      if (stopReason === "refusal") {
        addMsg("error", isNorsk() ? "Jarvis avslo denne forespørselen." : "Jarvis declined this request.");
      }
      break;
    }
    saveHistory();
  } catch (err) {
    history.length = historyLenAtStart - 1; // roll back the failed turn
    const msg = (err instanceof TypeError)
      ? "Fikk ikke kontakt med Claude API. Sjekk internettforbindelsen."
      : (err.message || String(err));
    addMsg("error", msg);
  } finally {
    busy = false;
    if (!speakQueueActive) {
      setMicState("");
      setStatus("");
      if (wakeMode) startWakeListening();
    }
  }
}

/* ---------- speech recognition (STT) ---------- */
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let rec = null;

function newRecognizer(continuous, interim) {
  const r = new SR();
  r.lang = store.lang;
  r.continuous = continuous;
  r.interimResults = !!interim;
  r.maxAlternatives = 1;
  return r;
}

function listenOnce() {
  if (!SR) {
    addMsg("error", "Talegjenkjenning støttes ikke i denne nettleseren. Prøv Safari eller Chrome, og skriv gjerne i tekstfeltet.");
    return;
  }
  if (busy) return;
  stopWakeListening();
  stopSpeaking();
  try { rec && rec.abort(); } catch (_) {}
  rec = newRecognizer(false, true);
  setMicState("listening");
  setStatus("Lytter … snakk nå", true);
  rec.onresult = (e) => {
    let interim = "", final = "";
    for (const res of e.results) {
      if (res.isFinal) final += res[0].transcript;
      else interim += res[0].transcript;
    }
    if (interim) setStatus("«" + interim + "»", true);
    if (final) {
      setMicState("");
      askJarvis(final);
    }
  };
  rec.onerror = (e) => {
    setMicState("");
    if (e.error === "not-allowed" || e.error === "service-not-allowed") {
      addMsg("error", "Mikrofontilgang avvist. Gi tillatelse i nettleser-/systeminnstillinger.");
    } else if (e.error !== "aborted" && e.error !== "no-speech") {
      addMsg("error", "Talegjenkjenningsfeil: " + e.error);
    }
    setStatus("");
    if (wakeMode) startWakeListening();
  };
  rec.onend = () => { if (!busy) { setMicState(speakQueueActive ? "speaking" : ""); if (!busy && !speakQueueActive) setStatus(""); } };
  rec.start();
}

/* ---------- wake word mode ---------- */
let wakeRec = null;
function startWakeListening() {
  if (!wakeMode || !SR || busy) return;
  try { wakeRec && wakeRec.abort(); } catch (_) {}
  wakeRec = newRecognizer(true, false);
  setStatus("Standby – si «Jarvis»", true);
  wakeRec.onresult = (e) => {
    const text = e.results[e.results.length - 1][0].transcript.trim();
    const lower = text.toLowerCase();
    const idx = lower.indexOf("jarvis");
    if (awaitingCommand) {
      awaitingCommand = false;
      stopWakeListening();
      askJarvis(text);
    } else if (idx !== -1) {
      const command = text.slice(idx + "jarvis".length).replace(/^[,.:;!?\s]+/, "");
      if (command.length > 2) {
        stopWakeListening();
        askJarvis(command);
      } else {
        awaitingCommand = true;
        speak(isNorsk() ? "Ja, sir?" : "Yes, sir?");
        setStatus("Ja, sir? …", true);
      }
    }
  };
  wakeRec.onerror = (e) => {
    if (e.error === "not-allowed") {
      wakeMode = false; store.wake = false; $("wakeToggle").checked = false;
      addMsg("error", "Mikrofontilgang avvist – våkneord deaktivert.");
      setStatus("");
    }
  };
  wakeRec.onend = () => { if (wakeMode && !busy) setTimeout(startWakeListening, 250); };
  try { wakeRec.start(); } catch (_) {}
}
function stopWakeListening() {
  if (wakeRec) { const r = wakeRec; wakeRec = null; try { r.onend = null; r.abort(); } catch (_) {} }
  if (!wakeMode) setStatus("");
}
function setWakeMode(on) {
  wakeMode = on;
  store.wake = on;
  if (on) startWakeListening(); else { stopWakeListening(); setStatus(""); }
}

/* ---------- events ---------- */
micBtn.addEventListener("click", () => {
  if (window.speechSynthesis && !speechSynthesis.speaking) {
    const u = new SpeechSynthesisUtterance(" ");
    u.volume = 0; speechSynthesis.speak(u);   // unlock TTS on iOS inside the gesture
  }
  listenOnce();
});
$("sendBtn").addEventListener("click", () => {
  const t = $("textInput").value;
  $("textInput").value = "";
  askJarvis(t);
});
$("textInput").addEventListener("keydown", (e) => {
  if (e.key === "Enter") { const t = e.target.value; e.target.value = ""; askJarvis(t); }
});

/* settings */
function openSettings() {
  $("apiKey").value = store.key;
  $("modelSelect").value = store.model;
  $("langSelect").value = store.lang;
  $("speakToggle").checked = store.speak;
  $("searchToggle").checked = store.search;
  $("wakeToggle").checked = store.wake;
  renderMemory();
  $("settings").classList.add("open");
}
function closeSettings() {
  store.key = $("apiKey").value.trim();
  store.model = $("modelSelect").value;
  store.lang = $("langSelect").value;
  store.voice = $("voiceSelect").value;
  store.speak = $("speakToggle").checked;
  store.search = $("searchToggle").checked;
  $("settings").classList.remove("open");
  tickClock();
  const wantWake = $("wakeToggle").checked;
  if (wantWake !== wakeMode) setWakeMode(wantWake);
}
$("settingsBtn").addEventListener("click", openSettings);
$("closeSettings").addEventListener("click", closeSettings);
$("settings").addEventListener("click", (e) => { if (e.target === $("settings")) closeSettings(); });
$("clearBtn").addEventListener("click", () => {
  history = [];
  store.history = [];
  log.innerHTML = "";
  greet();
  $("settings").classList.remove("open");
});
$("clearMemBtn").addEventListener("click", () => {
  store.memory = [];
  renderMemory();
});

/* ---------- boot ---------- */
function greet() {
  addMsg("hint", isNorsk()
    ? "Trykk på reaktoren for å snakke – eller skriv under. Prøv: «Hva blir været i morgen?» eller «Sett en timer på 5 minutter»."
    : "Tap the reactor to speak – or type below. Try: “What's the weather tomorrow?” or “Set a 5 minute timer”.");
  addMsg("jarvis", isNorsk()
    ? "God dag, sir. Alle systemer er operative. Hva kan jeg gjøre for Dem?"
    : "Good day, sir. All systems operational. How may I be of service?");
}
if (history.length) { renderHistory(); } else { greet(); }
log.scrollTop = log.scrollHeight;
if (!store.key) setTimeout(openSettings, 600);
if (store.wake && SR) setWakeMode(true);

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").catch(() => {});
}
</script>
</body>
